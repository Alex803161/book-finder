<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <script>
    (function() {
      const theme = localStorage.getItem('theme') || 'light';
      document.documentElement.className = theme;
      const font = localStorage.getItem('font');
      if (font) document.documentElement.style.setProperty('--font-family', font);
      const fontSize = localStorage.getItem('fontSize');
      if (fontSize) document.documentElement.style.setProperty('--font-size', fontSize + 'px');
      const textColor = localStorage.getItem('textColor');
      if (textColor) document.documentElement.style.setProperty('--text-color', textColor);
    })();
    </script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Книга — BookVista</title>
    <meta name="description" content="Подробная информация о книге: автор, описание, рейтинг, цена.">
    <meta property="og:title" content="Книга — BookVista">
    <meta property="og:description" content="Автор, описание, рейтинг и где купить.">
    <meta property="og:url" content="https://alex803161.github.io/book-finder/book.html">
    <meta property="og:type" content="book">
    <link rel="canonical" href="https://alex803161.github.io/book-finder/book.html">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📚</text></svg>">
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-B7CEKBWLWV"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-B7CEKBWLWV');
    </script>
    <script type="application/ld+json" id="bookJsonLd"></script>
</head>
<body class="light">
<div class="container">
    <div class="top-bar">
        <a href="index.html" style="text-decoration:none;color:var(--accent-color);font-weight:700;font-size:1.2rem;">📚 BookVista</a>
        <div class="lang-switch" id="langSwitch">
            <span class="lang-option active" data-lang="ru">🇷🇺</span>
            <span class="lang-option" data-lang="en">🇬🇧</span>
        </div>
    </div>
    <main style="margin-top:30px;">
        <nav aria-label="Breadcrumb" style="margin-bottom:16px;font-size:0.9rem;color:var(--muted-color);">
            <a href="index.html" style="color:var(--accent-color);">Главная</a> &rsaquo; <span id="breadcrumbTitle">Книга</span>
        </nav>
        <div id="bookDetail" class="book-detail"></div>

        <!-- Блок пользовательского рейтинга и отзывов -->
        <section id="userRatingsSection" style="margin-top:40px; display:none;">
            <h2 data-i18n="ratingsTitle">⭐ Оцените книгу</h2>
            <div style="margin: 10px 0;">
                <div id="starRating" style="display:flex; gap:4px; font-size:2rem; cursor:pointer;">
                    <span data-star="1">☆</span><span data-star="2">☆</span><span data-star="3">☆</span><span data-star="4">☆</span><span data-star="5">☆</span>
                </div>
                <button id="submitRating" class="btn btn-primary" style="margin-top:10px;" data-i18n="rateBtn">Оценить</button>
                <span id="ratingMsg" style="margin-left:12px; color:var(--accent-color);"></span>
            </div>
            <h3 style="margin-top:30px;" data-i18n="reviewsTitle">💬 Отзывы</h3>
            <div id="reviewsList" style="margin:16px 0;"></div>
            <form id="reviewForm" style="display:flex; flex-direction:column; gap:12px; max-width:500px;">
                <input type="text" id="reviewName" data-i18n-placeholder="reviewNamePlaceholder" placeholder="Ваше имя" required style="padding:10px; border:1px solid var(--border-color); border-radius:8px; background:var(--card-bg); color:var(--text-color);">
                <textarea id="reviewText" rows="3" data-i18n-placeholder="reviewTextPlaceholder" placeholder="Напишите отзыв..." required style="padding:10px; border:1px solid var(--border-color); border-radius:8px; background:var(--card-bg); color:var(--text-color);"></textarea>
                <button type="submit" class="btn btn-outline" style="align-self:flex-start;" data-i18n="submitReview">Отправить отзыв</button>
            </form>
            <p id="reviewMsg" style="margin-top:8px; color:var(--accent-color);"></p>
        </section>

        <div style="text-align:center;margin-top:20px;">
            <a href="index.html" class="btn btn-outline" data-i18n="backToHome">На главную</a>
        </div>
    </main>
    <footer class="site-footer">
        <p data-i18n="footerText">© 2025 BookVista — уютная книжная полка</p>
    </footer>
</div>
<script src="translations.js"></script>
<script>
const STORAGE_KEY='bookvista_';
let currentLang=localStorage.getItem('lang')||'ru';
let book=null;
let userRating = 0;
let currentBookId = null;

function t(key){return translations[currentLang]?.[key]||key;}

function applyLanguage(){
document.documentElement.lang=currentLang;
document.querySelectorAll('[data-i18n]').forEach(el=>{
    if(el.tagName==='INPUT'||el.tagName==='TEXTAREA') return;
    el.textContent=t(el.getAttribute('data-i18n'));
});
document.querySelectorAll('[data-i18n-placeholder]').forEach(el=>{
    el.placeholder=t(el.getAttribute('data-i18n-placeholder'));
});
document.querySelectorAll('.lang-option').forEach(opt=>opt.classList.toggle('active',opt.dataset.lang===currentLang));
if(book) updateSEOTags();
}

function updateSEOTags(){
if(!book)return;
const title = book.title + ' — ' + t('siteName');
document.title = title;
document.querySelector('meta[name="description"]').setAttribute('content',(book.description||'').slice(0,160));
document.querySelector('meta[property="og:title"]').setAttribute('content',book.title);
document.querySelector('meta[property="og:description"]').setAttribute('content',(book.description||'').slice(0,160));
document.querySelector('meta[property="og:url"]').setAttribute('content',window.location.href);
if(book.cover){
    document.querySelector('meta[property="og:image"]')?.remove();
    const metaImage = document.createElement('meta');
    metaImage.setAttribute('property','og:image');
    metaImage.content = book.cover;
    document.head.appendChild(metaImage);
}
document.getElementById('breadcrumbTitle').textContent = book.title;

// Итоговый рейтинг
const userRatingData = getUserRating();
let finalRating = book.rating;
if (userRatingData && userRatingData.count > 0) {
    finalRating = userRatingData.average.toFixed(1);
}
const ld={
  "@context":"https://schema.org",
  "@type":"Book",
  "name":book.title,
  "author":{ "@type":"Person", "name":book.author },
  "description":book.description,
  "offers":{
    "@type":"Offer",
    "price":0,
    "priceCurrency":"RUB",
    "availability":"https://schema.org/InStock"
  },
  "aggregateRating": finalRating ? {
    "@type":"AggregateRating",
    "ratingValue":finalRating,
    "bestRating":"5",
    "reviewCount": (userRatingData ? userRatingData.count : 0) || 1
  } : undefined,
  "image":book.cover||undefined
};
document.getElementById('bookJsonLd').textContent = JSON.stringify(ld);
}

function getUserRating() {
    if (!currentBookId) return null;
    const data = JSON.parse(localStorage.getItem(STORAGE_KEY + 'rating_' + currentBookId) || 'null');
    if (data && data.count > 0) {
        data.average = data.sum / data.count;
        return data;
    }
    return null;
}
function saveUserRating(ratingValue) {
    if (!currentBookId) return false;
    const key = STORAGE_KEY + 'rating_' + currentBookId;
    let data = JSON.parse(localStorage.getItem(key) || 'null');
    if (!data) data = { sum: 0, count: 0 };
    const voted = localStorage.getItem(STORAGE_KEY + 'voted_' + currentBookId);
    if (voted) return false;
    data.sum += ratingValue;
    data.count += 1;
    localStorage.setItem(key, JSON.stringify(data));
    localStorage.setItem(STORAGE_KEY + 'voted_' + currentBookId, '1');
    return true;
}
function getReviews() {
    if (!currentBookId) return [];
    return JSON.parse(localStorage.getItem(STORAGE_KEY + 'reviews_' + currentBookId) || '[]');
}
function addReview(name, text) {
    const reviews = getReviews();
    reviews.unshift({ name, text, date: new Date().toLocaleString('ru-RU') });
    localStorage.setItem(STORAGE_KEY + 'reviews_' + currentBookId, JSON.stringify(reviews));
}
function renderRatingsAndReviews() {
    const section = document.getElementById('userRatingsSection');
    if (!currentBookId) { section.style.display = 'none'; return; }
    section.style.display = 'block';

    const ratingData = getUserRating();
    const avg = ratingData ? ratingData.average.toFixed(1) : null;
    document.getElementById('starRating').querySelectorAll('span').forEach(span => {
        const star = parseInt(span.dataset.star);
        span.textContent = star <= userRating ? '★' : '☆';
    });
    document.getElementById('ratingMsg').textContent = avg ? `${t('avgRating')}: ${avg} (${ratingData.count})` : '';

    const reviewsList = document.getElementById('reviewsList');
    const reviews = getReviews();
    if (!reviews.length) {
        reviewsList.innerHTML = `<p style="color:var(--muted-color);">${t('noReviews')}</p>`;
    } else {
        reviewsList.innerHTML = reviews.map(r => `
            <div style="background:var(--card-bg); border:1px solid var(--border-color); border-radius:12px; padding:12px; margin-bottom:12px;">
                <strong style="color:var(--accent-color);">${r.name}</strong> <span style="font-size:0.8rem; color:var(--muted-color);">${r.date}</span>
                <p style="margin-top:4px; color:var(--text-color);">${r.text}</p>
            </div>
        `).join('');
    }
}

async function loadBook(){
const params=new URLSearchParams(window.location.search);
const id=params.get('id');
if(!id)return showError();
currentBookId = id;
const directBooks=JSON.parse(localStorage.getItem(STORAGE_KEY+'direct_books')||'[]');
const directBook=directBooks.find(b=>b.id===id);
if(directBook){book=mapDirectBook(directBook);renderBook();renderRatingsAndReviews();return;}
try{
const resp=await fetch('https://openlibrary.org/works/'+id+'.json');
if(!resp.ok)throw new Error('Not found');
const data=await resp.json();
book=mapOpenLibraryDetail(data,id);
renderBook();
renderRatingsAndReviews();
}catch(e){showError();}
}

function mapOpenLibraryDetail(data,id){
const coverUrl=data.covers?`https://covers.openlibrary.org/b/id/${data.covers[0]}-L.jpg`:'';
let rating = null;
if (data.ratings_average) rating = parseFloat(data.ratings_average).toFixed(1);
const previewLink = data.links?.find(l=>l.type==='access')?.url || `https://openlibrary.org/works/${id}`;
const downloadLink = data.ebooks?.[0]?.download_url || '';
return {
id: id,
title: data.title||'Без названия',
author: (data.authors||[]).map(a=>a.name||'Неизвестен').join(', ')||'Неизвестен',
genre: (data.subjects||[''])[0]||'',
language: (data.languages||[])[0]?.key?.replace('/languages/','')||'ru',
cover: coverUrl,
description: typeof data.description==='string'?data.description:(data.description?.value||'Описание отсутствует.'),
rating: rating,
pages: data.number_of_pages||0,
publisher: (data.publishers||[''])[0]||'',
publishedDate: data.first_publish_date||'',
isbn: (data.isbn_13||[])[0]||(data.isbn_10||[])[0]||'',
price: null,
buyLink: `https://www.litres.ru/search/?q=${encodeURIComponent(data.title)}`,
isFree: false,
previewLink: previewLink,
downloadLink: downloadLink
};
}
function mapDirectBook(d){return{id:d.id,title:d.title,author:d.author,genre:d.genre,language:d.language||'ru',cover:d.cover,description:d.description||'',rating:null,pages:0,publisher:'',publishedDate:'',isbn:'',price:null,buyLink:'#',isFree:false,previewLink:'',downloadLink:''};}
function renderBook(){
const container=document.getElementById('bookDetail');
if(!book)return;
updateSEOTags();
const coverHTML=book.cover
    ? `<img src="${book.cover}" alt="${book.title}" loading="lazy" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">`
    : '';
const placeholderHTML=book.cover
    ? `<div class="book-cover-placeholder" style="display:none; position:absolute; top:0; left:0; width:100%; height:100%;">📖</div>`
    : `<div class="book-cover-placeholder" style="position:absolute; top:0; left:0; width:100%; height:100%;">📖</div>`;
let actionsHTML = `<div style="display:flex;gap:12px;flex-wrap:wrap;">
    <a href="${book.buyLink}" target="_blank" class="btn btn-primary" onclick="gtag('event', 'click', { event_category: 'outbound', event_label: 'buy_button', value: '${book.title}' });">${t('buy')}</a>`;
if(book.previewLink){
    actionsHTML += `<a href="${book.previewLink}" target="_blank" class="btn btn-outline" onclick="gtag('event', 'preview', { event_category: 'engagement', event_label: 'read_preview', value: '${book.title}' });">${t('readPreview')}</a>`;
}
if(book.downloadLink){
    actionsHTML += `<a href="${book.downloadLink}" target="_blank" class="btn btn-outline" onclick="gtag('event', 'download', { event_category: 'engagement', event_label: 'download_fragment', value: '${book.title}' });">${t('downloadFragment')}</a>`;
}
actionsHTML += `<button class="btn btn-outline" onclick="shareBook('wa')">💬 ${t('shareWa')}</button>
    <button class="btn btn-outline" onclick="shareBook('tg')">✈️ ${t('shareTg')}</button>
    <button class="btn btn-outline" onclick="reportBook()">${t('report')}</button>
    </div>`;

const userRatingData = getUserRating();
let displayRating = book.rating;
if (userRatingData && userRatingData.count > 0) {
    displayRating = userRatingData.average.toFixed(1);
}
container.innerHTML='<div class="book-detail-cover" style="position:relative;">'+coverHTML+placeholderHTML+'</div><div class="book-detail-info"><h1>'+book.title+'</h1><div class="book-detail-author">'+book.author+'</div>'+(displayRating?'<p>★ '+displayRating+'</p>':'')+'<p>'+book.description+'</p>'+(book.pages?'<p>📄 '+book.pages+' стр.</p>':'')+(book.publisher?'<p>🏢 '+book.publisher+' ('+book.publishedDate+')</p>':'')+(book.isbn?'<p>🔢 ISBN: '+book.isbn+'</p>':'')+actionsHTML+'</div>';
}
function shareBook(platform){
if(!book)return;
const url=encodeURIComponent(window.location.href);
const text=encodeURIComponent(book.title+' — '+book.author);
if(platform==='wa')window.open('https://wa.me/?text='+text+'%20'+url);
else window.open('https://t.me/share/url?url='+url+'&text='+text);
}
function reportBook(){alert(t('reportSent'));}
function showError(){document.getElementById('bookDetail').innerHTML='<p style="text-align:center;padding:40px;">'+t('bookNotFound')+'</p>';}

document.addEventListener('DOMContentLoaded',()=>{
applyLanguage();
loadBook();

document.querySelectorAll('.lang-option').forEach(opt=>{opt.addEventListener('click',()=>{currentLang=opt.dataset.lang;localStorage.setItem('lang',currentLang);applyLanguage();});});

const stars = document.querySelectorAll('#starRating span');
stars.forEach(star => {
    star.addEventListener('click', () => {
        userRating = parseInt(star.dataset.star);
        renderRatingsAndReviews();
    });
});
document.getElementById('submitRating').addEventListener('click', () => {
    if (userRating === 0) return;
    const success = saveUserRating(userRating);
    if (success) {
        gtag('event', 'rate_book', { event_category: 'engagement', event_label: book.title, value: userRating });
        document.getElementById('ratingMsg').textContent = t('thanksRating');
        renderRatingsAndReviews();
        updateSEOTags();
        renderBook();
    } else {
        document.getElementById('ratingMsg').textContent = t('alreadyVoted');
    }
});

document.getElementById('reviewForm').addEventListener('submit', function(e) {
    e.preventDefault();
    const name = document.getElementById('reviewName').value.trim();
    const text = document.getElementById('reviewText').value.trim();
    if (!name || !text) return;
    addReview(name, text);
    gtag('event', 'add_review', { event_category: 'engagement', event_label: book.title });
    document.getElementById('reviewForm').reset();
    document.getElementById('reviewMsg').textContent = t('reviewAdded');
    setTimeout(() => document.getElementById('reviewMsg').textContent = '', 3000);
    renderRatingsAndReviews();
});
});
</script>
<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/book-finder/sw.js')
      .then(reg => console.log('SW registered'))
      .catch(err => console.log('SW fail', err));
  });
}
</script>
</body>
</html>
