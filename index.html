<script src="translations.js"></script>
<script>
const STORAGE_KEY='bookvista_';
let currentLang=localStorage.getItem('lang')||'ru';
let books=[],filteredBooks=[],currentPage=1,itemsPerPage=12;
const OPENLIBRARY_API='https://openlibrary.org/search.json';
document.addEventListener('DOMContentLoaded',()=>{applyLanguage();loadInitialBooks();setupEventListeners();setupSettingsPanel();});
function t(key){return translations[currentLang]?.[key]||key;}
function applyLanguage(){
document.documentElement.lang=currentLang;
document.querySelectorAll('[data-i18n]').forEach(el=>{if(el.tagName==='INPUT'||el.tagName==='TEXTAREA')return;el.textContent=t(el.getAttribute('data-i18n'));});
document.querySelectorAll('[data-i18n-placeholder]').forEach(el=>{el.placeholder=t(el.getAttribute('data-i18n-placeholder'));});
document.querySelectorAll('.lang-option').forEach(opt=>opt.classList.toggle('active',opt.dataset.lang===currentLang));
document.title=t('siteName');
if(filteredBooks.length)renderBooks();
}
function setupSettingsPanel(){
const icon=document.getElementById('settingsIcon');
const dropdown=document.getElementById('settingsDropdown');
const closeBtn=document.getElementById('closeSettings');
icon.addEventListener('click',()=>dropdown.classList.toggle('show'));
closeBtn.addEventListener('click',()=>dropdown.classList.remove('show'));
document.addEventListener('click',(e)=>{if(!icon.contains(e.target)&&!dropdown.contains(e.target))dropdown.classList.remove('show');});
const savedTheme=localStorage.getItem('theme')||'light';
document.documentElement.className=savedTheme;
document.getElementById('themeLight').classList.toggle('active',savedTheme==='light');
document.getElementById('themeDark').classList.toggle('active',savedTheme==='dark');
document.getElementById('themeLight').addEventListener('click',()=>setTheme('light'));
document.getElementById('themeDark').addEventListener('click',()=>setTheme('dark'));
const savedFont=localStorage.getItem('font')||'PT Serif, Georgia, serif';
document.getElementById('fontSelect').value=savedFont;
document.documentElement.style.setProperty('--font-family',savedFont);
document.getElementById('fontSelect').addEventListener('change',(e)=>{document.documentElement.style.setProperty('--font-family',e.target.value);localStorage.setItem('font',e.target.value);});
const savedFontSize=localStorage.getItem('fontSize')||'18';
document.getElementById('fontSizeSlider').value=savedFontSize;
document.getElementById('fontSizeValue').textContent=savedFontSize+'px';
document.documentElement.style.setProperty('--font-size',savedFontSize+'px');
document.getElementById('fontSizeSlider').addEventListener('input',(e)=>{document.documentElement.style.setProperty('--font-size',e.target.value+'px');document.getElementById('fontSizeValue').textContent=e.target.value+'px';localStorage.setItem('fontSize',e.target.value);});
const savedColor=localStorage.getItem('textColor')||'#3E2723';
document.documentElement.style.setProperty('--text-color',savedColor);
document.querySelectorAll('.color-dot').forEach(dot=>{dot.classList.toggle('active',dot.dataset.color===savedColor);dot.addEventListener('click',()=>{document.querySelectorAll('.color-dot').forEach(d=>d.classList.remove('active'));dot.classList.add('active');document.documentElement.style.setProperty('--text-color',dot.dataset.color);localStorage.setItem('textColor',dot.dataset.color);});});
}
function setTheme(theme){document.documentElement.className=theme;localStorage.setItem('theme',theme);document.getElementById('themeLight').classList.toggle('active',theme==='light');document.getElementById('themeDark').classList.toggle('active',theme==='dark');}
function getDirectBooks(){
    return JSON.parse(localStorage.getItem(STORAGE_KEY+'direct_books')||'[]').map(b=>({
        ...b,
        rating: b.rating||null,
        description: b.description||'',
        buyLink: b.buyLink||'#'
    }));
}
async function loadInitialBooks(){
try{
const resp=await fetch(OPENLIBRARY_API+'?q=subject:fiction&limit=100');
if(!resp.ok)throw new Error('API error');
const data=await resp.json();
const directBooks=getDirectBooks();
books=[...directBooks, ...(data.docs||[]).map(mapOpenLibraryBook)];
applyFiltersAndSort();
}catch(e){console.warn('Using sample books');books=getSampleBooks();applyFiltersAndSort();}
}
async function searchBooks(query){
if(!query)return;
try{
const resp=await fetch(OPENLIBRARY_API+'?q='+encodeURIComponent(query));
if(!resp.ok)throw new Error('API error');
const data=await resp.json();
const directBooks=getDirectBooks().filter(b=>b.title.toLowerCase().includes(query.toLowerCase())||b.author.toLowerCase().includes(query.toLowerCase()));
books=[...directBooks, ...(data.docs||[]).map(mapOpenLibraryBook)];
applyFiltersAndSort();
saveSearch(query);
}catch(e){
console.warn('Search API error, falling back to local');
filteredBooks=getSampleBooks().filter(b=>b.title.toLowerCase().includes(query.toLowerCase())||b.author.toLowerCase().includes(query.toLowerCase()));
renderBooks();
}
}
function mapOpenLibraryBook(doc){
const coverId=doc.cover_i;
const coverUrl=coverId?`https://covers.openlibrary.org/b/id/${coverId}-M.jpg`:'';
const lang = (doc.language && doc.language.length) ? doc.language[0].toLowerCase() : 'eng';
let rating = null;
if (doc.ratings_average) {
    rating = parseFloat(doc.ratings_average).toFixed(1);
}
return {
id: doc.key.replace('/works/','')||doc.cover_edition_key||doc.key,
title: doc.title||'Без названия',
author: (doc.author_name||['Неизвестен']).join(', '),
genre: (doc.subject||['fiction'])[0].toLowerCase(),
language: lang,
cover: coverUrl,
description: (doc.first_sentence||[]).slice(0,3).join(' ')||'Описание отсутствует.',
rating: rating,
price: null,
buyLink: `https://www.litres.ru/search/?q=${encodeURIComponent(doc.title)}`,
isFree: false
};
}
function getSampleBooks(){return [{id:'1',title:'Мастер и Маргарита',author:'М. Булгаков',genre:'fiction',language:'rus',rating:4.8,price:null,cover:'',buyLink:'https://www.litres.ru/search/?q=Мастер+и+Маргарита',isFree:false},{id:'2',title:'1984',author:'Дж. Оруэлл',genre:'fantasy',language:'eng',rating:4.6,price:null,cover:'',buyLink:'https://www.litres.ru/search/?q=1984',isFree:false},{id:'3',title:'Sapiens',author:'Ю. Н. Харари',genre:'nonfiction',language:'eng',rating:4.7,price:null,cover:'',buyLink:'https://www.litres.ru/search/?q=Sapiens',isFree:false},{id:'4',title:'Убийство в Восточном экспрессе',author:'А. Кристи',genre:'mystery',language:'rus',rating:4.5,price:null,cover:'',buyLink:'https://www.litres.ru/search/?q=Убийство+в+Восточном+экспрессе',isFree:false}];}
function applyFiltersAndSort(){
    const genre=document.getElementById('filterGenre').value;
    filteredBooks=books.filter(b=>(!genre||b.genre===genre));
    const sortBy=document.getElementById('sortSelect').value;
    if(sortBy==='rating'){
        filteredBooks.sort((a,b)=>{
            // сортировка по итоговому рейтингу (пользовательский + из API)
            const aRating = getUserAverageRating(a.id) || a.rating || 0;
            const bRating = getUserAverageRating(b.id) || b.rating || 0;
            return bRating - aRating;
        });
    } else if(sortBy==='title'){
        filteredBooks.sort((a,b)=>a.title.localeCompare(b.title));
    } else if(sortBy==='newest'){
        filteredBooks.sort((a,b)=>{
            const aYear=a.addedAt?a.addedAt.slice(0,4):(a.first_publish_year||0);
            const bYear=b.addedAt?b.addedAt.slice(0,4):(b.first_publish_year||0);
            return bYear-aYear;
        });
    }
    currentPage=1;
    renderBooks();
}
function getUserAverageRating(bookId) {
    const key = STORAGE_KEY + 'rating_' + bookId;
    const data = JSON.parse(localStorage.getItem(key) || 'null');
    if (data && data.count > 0) {
        return parseFloat((data.sum / data.count).toFixed(1));
    }
    return null;
}
function renderBooks(){
const grid=document.getElementById('booksContainer');
const start=(currentPage-1)*itemsPerPage;
const end=start+itemsPerPage;
const toShow=filteredBooks.slice(start,end);
document.getElementById('totalBooks').textContent=filteredBooks.length;
if(!toShow.length){grid.innerHTML='<p style="grid-column:1/-1;text-align:center;" class="no-results-text">'+t('noResults')+'</p>';document.getElementById('pagination').innerHTML='';return;}
grid.innerHTML=toShow.map(book=>{
    const coverHTML=book.cover
        ? `<img src="${book.cover}" alt="${book.title}" loading="lazy" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">`
        : '';
    const placeholderHTML=book.cover
        ? `<div class="book-cover-placeholder" style="display:none;">📖</div>`
        : `<div class="book-cover-placeholder">📖</div>`;
    
    // Итоговый рейтинг
    const userAvg = getUserAverageRating(book.id);
    const displayRating = userAvg !== null ? userAvg : book.rating;
    const ratingHTML = displayRating ? `<div style="display:flex;justify-content:space-between;align-items:center;margin-top:auto;font-size:0.8rem;"><span>★ ${displayRating}</span></div>` : '';
    
    return `<div class="book-card" onclick="openBook('${book.id}')">
        <div class="book-cover">
            ${coverHTML}
            ${placeholderHTML}
        </div>
        <div class="book-info" style="flex:1;display:flex;flex-direction:column;gap:4px;">
            <div class="book-title">${book.title}</div>
            <div class="book-author">${book.author}</div>
            ${ratingHTML}
            <div class="book-actions" onclick="event.stopPropagation();" style="margin-top:8px;">
                <button class="save-btn${isFavorite(book.id)?' saved':''}" onclick="toggleFavorite('${book.id}')" title="${isFavorite(book.id)?t('removeFav'):t('addFav')}">${isFavorite(book.id)?'❤️':'🤍'}</button>
                <a href="${book.buyLink}" target="_blank" class="btn-buy" onclick="gtag('event', 'click', { event_category: 'outbound', event_label: 'buy_button', value: '${book.title}' });">${t('buy')}</a>
            </div>
        </div>
    </div>`;
}).join('');
const totalPages=Math.ceil(filteredBooks.length/itemsPerPage);
let paginationHTML='';
if(totalPages>1){
    paginationHTML+=`<button onclick="changePage(${currentPage-1})" ${currentPage===1?'disabled':''}>‹ Назад</button>`;
    for(let i=1;i<=totalPages;i++){
        paginationHTML+=`<button class="${i===currentPage?'current-page':''}" onclick="changePage(${i})">${i}</button>`;
    }
    paginationHTML+=`<button onclick="changePage(${currentPage+1})" ${currentPage===totalPages?'disabled':''}>Вперёд ›</button>`;
}
document.getElementById('pagination').innerHTML=paginationHTML;
renderRecent();
}
function changePage(page){
    const totalPages=Math.ceil(filteredBooks.length/itemsPerPage);
    if(page<1||page>totalPages)return;
    currentPage=page;
    renderBooks();
}
function renderRecent(){
const recent=JSON.parse(localStorage.getItem(STORAGE_KEY+'recent')||'[]');
const grid=document.getElementById('recentGrid');
if(!grid)return;
if(!recent.length){grid.innerHTML='';return;}
grid.innerHTML=recent.slice(0,4).map(book=>'<div class="book-card" style="position:relative;" onclick="window.location.href=\'book.html?id='+book.id+'\'"><button class="btn-close-settings" style="position:absolute;top:8px;right:8px;width:22px;height:22px;font-size:0.7rem;z-index:10;" onclick="event.stopPropagation();deleteRecent(\''+book.id+'\')">✕</button><div class="book-cover"><div class="book-cover-placeholder">📖</div></div><div class="book-title">'+book.title+'</div><div class="book-author">'+book.author+'</div></div>').join('');
}
function deleteRecent(id){
const recent=JSON.parse(localStorage.getItem(STORAGE_KEY+'recent')||'[]');
localStorage.setItem(STORAGE_KEY+'recent',JSON.stringify(recent.filter(r=>r.id!==id)));
renderRecent();
}
function getFavorites(){return JSON.parse(localStorage.getItem(STORAGE_KEY+'fav')||'[]');}
function isFavorite(id){return getFavorites().some(f=>f.id===id);}
function toggleFavorite(id){
    const favs=getFavorites();
    const book=books.find(b=>b.id===id);
    if(!book)return;
    const idx=favs.findIndex(f=>f.id===id);
    if(idx>-1){
        favs.splice(idx,1);
        gtag('event', 'remove_from_favorites', { event_category: 'engagement', event_label: book.title });
    } else {
        favs.push({id:book.id,title:book.title,author:book.author,rating:book.rating,price:book.price,cover:book.cover});
        gtag('event', 'add_to_favorites', { event_category: 'engagement', event_label: book.title });
    }
    localStorage.setItem(STORAGE_KEY+'fav',JSON.stringify(favs));
    renderBooks();
}
function openBook(id){const book=books.find(b=>b.id===id);if(!book)return;const recent=JSON.parse(localStorage.getItem(STORAGE_KEY+'recent')||'[]');const filtered=recent.filter(r=>r.id!==id);filtered.unshift({id:book.id,title:book.title,author:book.author});localStorage.setItem(STORAGE_KEY+'recent',JSON.stringify(filtered.slice(0,20)));window.location.href='book.html?id='+id;}
function saveSearch(query){const searches=JSON.parse(localStorage.getItem(STORAGE_KEY+'searches')||'[]');if(!searches.includes(query)){searches.unshift(query);localStorage.setItem(STORAGE_KEY+'searches',JSON.stringify(searches.slice(0,10)));renderSavedSearches();}}
function deleteSearch(query){const searches=JSON.parse(localStorage.getItem(STORAGE_KEY+'searches')||'[]');localStorage.setItem(STORAGE_KEY+'searches',JSON.stringify(searches.filter(s=>s!==query)));renderSavedSearches();}
function renderSavedSearches(){const searches=JSON.parse(localStorage.getItem(STORAGE_KEY+'searches')||'[]');const container=document.getElementById('savedSearchesList');if(!container)return;container.innerHTML=searches.map(s=>'<span style="display:inline-flex;align-items:center;gap:4px;"><button class="btn btn-outline" style="font-size:0.85rem;" onclick="document.getElementById(\'searchInput\').value=\''+s+'\';searchBooks(\''+s+'\')">'+s+'</button><button class="btn-close-settings" style="width:20px;height:20px;font-size:0.7rem;" onclick="deleteSearch(\''+s+'\')">✕</button></span>').join('');}
function subscribe(email){
    const subs=JSON.parse(localStorage.getItem(STORAGE_KEY+'subs')||'[]');
    if(subs.includes(email)){
        document.getElementById('subMsg').textContent=t('subscriptionExists');
        return;
    }
    subs.push(email);
    localStorage.setItem(STORAGE_KEY+'subs',JSON.stringify(subs));
    document.getElementById('subMsg').textContent=t('subscriptionSuccess');
    gtag('event', 'subscribe', { event_category: 'engagement', event_label: email });
}
function setupEventListeners(){
document.getElementById('searchButton').addEventListener('click',()=>{currentQuery=document.getElementById('searchInput').value.trim();if(currentQuery)searchBooks(currentQuery);});
document.getElementById('searchInput').addEventListener('keypress',(e)=>{if(e.key==='Enter'){currentQuery=e.target.value.trim();if(currentQuery)searchBooks(currentQuery);}});
document.getElementById('filterGenre').addEventListener('change',()=>{applyFiltersAndSort();});
document.getElementById('sortSelect').addEventListener('change',()=>{applyFiltersAndSort();});
document.getElementById('subBtn').addEventListener('click',()=>{const email=document.getElementById('subEmail').value.trim();if(email)subscribe(email);});
document.querySelectorAll('.lang-option').forEach(opt=>{opt.addEventListener('click',()=>{currentLang=opt.dataset.lang;localStorage.setItem('lang',currentLang);applyLanguage();});});
renderSavedSearches();renderRecent();
}
</script>
