<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <script>
    (function() {
      const theme = localStorage.getItem('theme') || 'light';
      document.documentElement.className = theme;
      const font = localStorage.getItem('font');
      if (font) document.documentElement.style.setProperty('--font-family', font);
      const fontSize = localStorage.getItem('fontSize');
      if (fontSize) document.documentElement.style.setProperty('--font-size', fontSize + 'px');
      const textColor = localStorage.getItem('textColor');
      if (textColor) document.documentElement.style.setProperty('--text-color', textColor);
    })();
    </script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Добавить книгу — BookVista</title>
    <meta name="description" content="Добавьте свою книгу в каталог BookVista">
    <link rel="canonical" href="https://alex803161.github.io/book-finder/post-book.html">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📚</text></svg>">
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-B7CEKBWLWV"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-B7CEKBWLWV');
    </script>
</head>
<body class="light">
<div class="container">
    <div class="top-bar">
        <a href="index.html" style="text-decoration:none;color:var(--accent-color);font-weight:700;font-size:1.2rem;">📚 BookVista</a>
        <div class="lang-switch" id="langSwitch">
            <span class="lang-option active" data-lang="ru">🇷🇺</span>
            <span class="lang-option" data-lang="en">🇬🇧</span>
        </div>
    </div>
    <main style="margin-top:30px;">
        <h1 data-i18n="addBookTitle" style="margin-bottom:20px;">Добавить книгу в каталог</h1>
        <form id="addBookForm" style="max-width:500px; margin:0 auto; display:flex; flex-direction:column; gap:16px;">
            <div>
                <label data-i18n="bookTitleLabel">Название книги</label>
                <input type="text" id="bookTitle" required>
            </div>
            <div>
                <label data-i18n="authorLabel">Автор</label>
                <input type="text" id="bookAuthor" required>
            </div>
            <div>
                <label data-i18n="genreLabel">Жанр</label>
                <select id="bookGenre" class="filter-select">
                    <option value="fiction">Художественная литература</option>
                    <option value="nonfiction">Документальная проза</option>
                    <option value="science">Наука и технологии</option>
                    <option value="fantasy">Фэнтези</option>
                    <option value="mystery">Детективы и триллеры</option>
                    <option value="romance">Любовные романы</option>
                    <option value="horror">Ужасы и мистика</option>
                    <option value="poetry">Поэзия</option>
                    <option value="children">Детская литература</option>
                    <option value="other">Другое</option>
                </select>
            </div>
            <div>
                <label data-i18n="priceLabel">Цена (руб.)</label>
                <input type="number" id="bookPrice" min="0" step="0.01" value="0">
            </div>
            <div>
                <label data-i18n="coverUrlLabel">Ссылка на обложку</label>
                <input type="url" id="bookCover" placeholder="https://...">
            </div>
            <div>
                <label data-i18n="descriptionLabel">Описание</label>
                <textarea id="bookDescription" rows="4"></textarea>
            </div>
            <button type="submit" class="btn btn-primary" data-i18n="saveBtn">Сохранить</button>
        </form>
        <p id="postMsg" style="text-align:center; margin-top:16px; color:var(--accent-color);"></p>
        <div style="text-align:center;margin-top:20px;">
            <a href="index.html" class="btn btn-outline" data-i18n="backToHome">На главную</a>
        </div>
    </main>
    <footer class="site-footer">
        <p data-i18n="footerText">© 2025 BookVista — уютная книжная полка</p>
    </footer>
</div>
<script src="translations.js"></script>
<script>
const STORAGE_KEY = 'bookvista_';
let currentLang = localStorage.getItem('lang') || 'ru';
function t(key) { return translations[currentLang]?.[key] || key; }
function applyLanguage() {
    document.documentElement.lang = currentLang;
    document.querySelectorAll('[data-i18n]').forEach(el => {
        if (el.tagName === 'INPUT' || el.tagName === 'TEXTAREA') return;
        el.textContent = t(el.getAttribute('data-i18n'));
    });
    document.querySelectorAll('.lang-option').forEach(opt => opt.classList.toggle('active', opt.dataset.lang === currentLang));
}

document.addEventListener('DOMContentLoaded', () => {
    applyLanguage();
    document.querySelectorAll('.lang-option').forEach(opt => {
        opt.addEventListener('click', () => {
            currentLang = opt.dataset.lang;
            localStorage.setItem('lang', currentLang);
            applyLanguage();
        });
    });

    document.getElementById('addBookForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const title = document.getElementById('bookTitle').value.trim();
        const author = document.getElementById('bookAuthor').value.trim();
        const genre = document.getElementById('bookGenre').value;
        const price = parseFloat(document.getElementById('bookPrice').value) || 0;
        const cover = document.getElementById('bookCover').value.trim();
        const description = document.getElementById('bookDescription').value.trim();

        if (!title || !author) {
            document.getElementById('postMsg').textContent = 'Название и автор обязательны';
            return;
        }

        const newBook = {
            id: 'user_' + Date.now(),
            title,
            author,
            genre,
            price,
            cover,
            description,
            addedAt: new Date().toISOString()
        };

        const directBooks = JSON.parse(localStorage.getItem(STORAGE_KEY + 'direct_books') || '[]');
        directBooks.push(newBook);
        localStorage.setItem(STORAGE_KEY + 'direct_books', JSON.stringify(directBooks));

        document.getElementById('postMsg').textContent = t('saveBtn') + '! Книга добавлена.';
        this.reset();
        setTimeout(() => { document.getElementById('postMsg').textContent = ''; }, 3000);
    });
});
</script>
</body>
</html>
